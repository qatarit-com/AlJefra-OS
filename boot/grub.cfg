# AlJefra OS - GRUB Configuration
# Universal: works on both BIOS and UEFI, all hardware

# Load video drivers based on boot platform
insmod all_video
if [ x$grub_platform = xefi ]; then
    insmod efi_gop
    insmod efi_uga
fi

# Load font (required for gfxterm)
insmod font
if loadfont /boot/grub/fonts/unicode.pf2; then
    insmod gfxterm
    set gfxmode=auto
    terminal_output gfxterm
else
    terminal_output console
fi

set timeout=5
set default=0

menuentry "AlJefra OS" {
    set gfxpayload=keep
    multiboot /boot/aljefra.bin
    boot
}

menuentry "AlJefra OS (Safe Video 800x600)" {
    set gfxpayload=800x600x32,800x600,auto
    multiboot /boot/aljefra.bin
    boot
}

menuentry "AlJefra OS (Text Mode)" {
    set gfxpayload=text
    multiboot /boot/aljefra.bin
    boot
}
