# AlJefra OS - GRUB Configuration
# Prefer the smallest possible pre-kernel path on real hardware.
# Some UEFI laptops, including ASUS models, stall when GRUB probes every
# video backend via all_video before handing off to the kernel.

if [ x$grub_platform = xefi ]; then
    insmod efi_gop
    insmod efi_uga
    insmod font
    if loadfont /boot/grub/fonts/unicode.pf2; then
        insmod gfxterm
        set gfxmode=auto
        terminal_output gfxterm
    else
        terminal_output console
    fi
else
    terminal_output console
fi

set timeout_style=hidden
set timeout=1
set default=0

menuentry "AlJefra OS" {
    set gfxpayload=keep
    multiboot /boot/aljefra.bin
    boot
}

menuentry "AlJefra OS (Safe Video 800x600)" {
    set gfxpayload=800x600x32,800x600,auto
    multiboot /boot/aljefra.bin
    boot
}

menuentry "AlJefra OS (Text Mode)" {
    set gfxpayload=text
    multiboot /boot/aljefra.bin
    boot
}
