<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#f0f0f0" rx="4"/>

  <!-- Left red panel: "The AlJefra Model" -->
  <rect x="0" y="0" width="200" height="400" fill="#e53935" rx="4"/>
  <text x="100" y="140" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="300" fill="white" text-anchor="middle">The</text>
  <text x="100" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="300" fill="white" text-anchor="middle">AlJefra</text>
  <text x="100" y="260" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="300" fill="white" text-anchor="middle">Model</text>

  <!-- Top blue section: Software -->
  <rect x="220" y="10" width="570" height="180" fill="#2196f3" rx="6"/>
  <text x="340" y="115" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="300" fill="white" text-anchor="middle">Software</text>

  <!-- Application Container box -->
  <rect x="440" y="30" width="160" height="140" fill="rgba(255,255,255,0.15)" rx="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="520" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="white" text-anchor="middle">Application</text>
  <text x="520" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="white" text-anchor="middle">Container</text>

  <!-- Operating System box -->
  <rect x="620" y="30" width="155" height="140" fill="rgba(255,255,255,0.15)" rx="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="697" y="90" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="white" text-anchor="middle">Operating</text>
  <text x="697" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="300" fill="white" text-anchor="middle">System</text>

  <!-- Bottom green section: Hardware -->
  <rect x="220" y="210" width="570" height="180" fill="#4caf50" rx="6"/>
  <text x="340" y="315" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="36" font-weight="300" fill="white" text-anchor="middle">Hardware</text>

  <!-- CPU box -->
  <rect x="440" y="230" width="100" height="140" fill="rgba(255,255,255,0.15)" rx="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="490" y="310" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="white" text-anchor="middle">CPU</text>

  <!-- RAM box -->
  <rect x="555" y="230" width="100" height="140" fill="rgba(255,255,255,0.15)" rx="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="605" y="310" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="white" text-anchor="middle">RAM</text>

  <!-- I/O box -->
  <rect x="670" y="230" width="100" height="140" fill="rgba(255,255,255,0.15)" rx="6" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <text x="720" y="310" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="300" fill="white" text-anchor="middle">I/O</text>
</svg>
