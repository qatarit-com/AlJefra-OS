version: "3.9"

services:
  marketplace:
    build: .
    container_name: aljefra-marketplace
    ports:
      - "8080:8080"
    environment:
      - ALJEFRA_HOST=0.0.0.0
      - ALJEFRA_PORT=8080
    volumes:
      # Persist driver uploads and catalog across restarts
      - driver-data:/app/drivers
      - ./catalog.json:/app/catalog.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  driver-data:
