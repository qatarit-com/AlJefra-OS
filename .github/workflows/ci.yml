# SPDX-License-Identifier: MIT
# AlJefra OS -- Multi-Architecture CI/CD Pipeline
#
# Builds the kernel for all three supported architectures (x86_64,
# aarch64, riscv64) and runs a QEMU boot smoke-test on x86_64 to
# verify the kernel reaches the "Ready" state.

name: AlJefra OS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [ x86_64, aarch64, riscv64 ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install toolchain (x86_64)
        if: matrix.arch == 'x86_64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            nasm gcc binutils make

      - name: Install toolchain (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu make

      - name: Install toolchain (riscv64)
        if: matrix.arch == 'riscv64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu make

      - name: Install signing dependencies
        run: pip install pynacl

      - name: Build kernel
        run: make ARCH=${{ matrix.arch }}

      - name: Patch ELF with secure boot hash
        run: make ARCH=${{ matrix.arch }} patch-elf

      - name: Generate signing keys (dev)
        run: make keygen || true

      - name: Sign kernel
        run: make ARCH=${{ matrix.arch }} sign

      - name: Verify signed kernel
        run: make ARCH=${{ matrix.arch }} verify

      - name: Show binary size
        run: ls -lh build/${{ matrix.arch }}/bin/

      - name: Upload kernel binary
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.arch }}
          path: build/${{ matrix.arch }}/bin/
          retention-days: 30

  check-docs:
    name: Documentation consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Check documentation consistency
        run: python3 tools/doc_check.py

  boot-test-bios:
    name: Boot test — BIOS (x86_64 QEMU)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install QEMU and toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 nasm gcc binutils make

      - name: Build and test BIOS boot
        run: make ARCH=x86_64 test-bios

  boot-test-uefi:
    name: Boot test — UEFI (x86_64 QEMU + OVMF)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install QEMU, OVMF, and GRUB tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 ovmf grub-pc-bin grub-efi-amd64-bin \
            grub-common grub2-common xorriso mtools \
            nasm gcc binutils make

      - name: Build and test UEFI boot
        run: make ARCH=x86_64 test-uefi
